<!DOCTYPE html>
<html>
<head>
    <title>EaglercraftZ Frame</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<iframe id="gameFrame"></iframe>

<script>
    // FIXED URL: Added "/get?url=" so the proxy server can understand the request
    fetch('https://allorigins.win' + encodeURIComponent('https://eaglercraftz.pages.dev'))
        .then(response => response.json())
        .then(data => {
            const blob = new Blob([data.contents], { type: 'text/html' });
            document.getElementById('gameFrame').src = URL.createObjectURL(blob);
        });
</script>

</body>
</html>
