<!DOCTYPE html>
<html>
<head>
    <title>Debug Loader</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #status {
            padding: 15px;
            white-space: pre-wrap;
        }

        iframe {
            width: 100%;
            height: calc(100% - 120px);
            border: none;
            display: none;
        }
    </style>
</head>
<body>

<div id="status">Starting...</div>
<iframe id="gameFrame"></iframe>

<script>
const statusBox = document.getElementById("status");
const frame = document.getElementById("gameFrame");

function log(msg) {
    console.log(msg);
    statusBox.textContent += "\n" + msg;
}

(async () => {
    try {
        const target = "https://eaglercraftz.pages.dev";

        log("Preparing request...");

        const proxyURL =
            "https://api.allorigins.win/get?url=" +
            encodeURIComponent(target);

        log("Request URL:");
        log(proxyURL);

        const response = await fetch(proxyURL);

        log("Response received.");
        log("HTTP Status: " + response.status);

        const text = await response.text();

        log("Response length: " + text.length);

        let data;

        try {
            data = JSON.parse(text);
            log("JSON parsed successfully.");
        } catch (e) {
            log("JSON parse failed.");
            log(text.substring(0, 500));
            return;
        }

        if (!data.contents) {
            log("No contents field found.");
            return;
        }

        log("Creating blob...");

        const blob = new Blob(
            [data.contents],
            { type: "text/html" }
        );

        const blobURL = URL.createObjectURL(blob);

        log("Loading iframe...");

        frame.style.display = "block";
        frame.src = blobURL;

        frame.onload = () => {
            log("Iframe loaded.");
        };

    } catch (err) {
        log("ERROR:");
        log(err.toString());
        console.error(err);
    }
})();
</script>

</body>
</html>
