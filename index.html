<!DOCTYPE html>
<html>
<head>
    <title>EaglercraftZ Frame</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
        }

        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div id="status">Loading...</div>

<iframe id="gameFrame"></iframe>

<script>
(async () => {
    const status = document.getElementById("status");
    const frame = document.getElementById("gameFrame");

    try {
        const targetURL = "https://eaglercraftz.pages.dev";

        status.textContent = "Fetching site...";

        const response = await fetch(
            "https://api.allorigins.win/get?url=" +
            encodeURIComponent(targetURL)
        );

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!data.contents) {
            throw new Error("No HTML returned");
        }

        status.textContent = "Building page...";

        const blob = new Blob(
            [data.contents],
            { type: "text/html" }
        );

        frame.src = URL.createObjectURL(blob);

        frame.onload = () => {
            status.style.display = "none";
        };

    } catch (err) {
        console.error(err);
        status.innerHTML =
            "<b>Failed to load site</b><br>" +
            err.message;
    }
})();
</script>

</body>
</html>
